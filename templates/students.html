<!DOCTYPE html>
<html>

<head>

<title>Students</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Student List</h2>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Branch</th>
<th>Action</th>

</tr>

{% for s in students %}

<tr>

<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>

<td>

<a href="/edit/{{s[0]}}">Edit</a>

<a href="/delete/{{s[0]}}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</div>

</body>

</html>
